<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says Game</title>
    <link rel="stylesheet" href="style.css">   
</head>
<body>
    
    <h1>Simon Says Game</h1>
 <h2>Press any Key to Start the Game</h2>
    <div class="container">
        <div class="button red" id="red"  style="background-color: rgb(229, 91, 91);" >1</div>
        <div class="button blue" id="blue" style="background-color: rgb(48, 91, 156);" >2</div>
        <div class="button yellow" id="yellow" style="background-color: rgb(231, 158, 61);" >3</div>
        <div class="button purple" id="purple" style="background-color: rgb(144, 68, 180);" >4</div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/axios@1.13.2/dist/axios.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
